<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Office Trivia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --paper: #f5f0e8;
    --ink: #1a1a1a;
    --accent: #c0392b;
    --muted: #7a6e5f;
    --border: #2a2a2a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Courier Prime', monospace;
    overflow: hidden;
  }

  /* ── FULL VIEW ── */
  #full-view {
    display: none;
    width: 100%; height: 100%;
    position: relative;
    padding: 18px 20px 14px;
    flex-direction: column;
  }

  .paper-grain {
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.04) 27px, rgba(0,0,0,0.04) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.015) 40px, rgba(0,0,0,0.015) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .content-wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100%;
  }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 12px;
  }

  .show-label {
    font-family: 'Special Elite', cursive;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dunder-badge {
    font-family: 'Special Elite', cursive;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--paper);
    background: var(--ink);
    padding: 2px 7px;
    border: 1px solid var(--ink);
  }

  .mode-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }

  .main-content {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .category-tag {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    border-left: 3px solid var(--accent);
    padding-left: 8px;
  }

  .trivia-text {
    font-family: 'Special Elite', cursive;
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink);
    max-width: 95%;
  }

  .trivia-text.answer-text {
    font-size: 20px;
    color: var(--accent);
    line-height: 1.4;
  }

  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(0,0,0,0.15);
    padding-top: 8px;
    margin-top: 10px;
  }

  .ep-ref {
    font-size: 8.5px;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-style: italic;
  }

  .seed-num {
    font-size: 8px;
    color: rgba(0,0,0,0.2);
    letter-spacing: 0.1em;
  }

  /* Q decoration */
  .q-mark {
    font-family: 'Special Elite', cursive;
    font-size: 72px;
    color: rgba(0,0,0,0.04);
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-60%);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
  }

  .checkmark {
    font-size: 52px;
    color: rgba(192,57,43,0.07);
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-60%);
    pointer-events: none;
    z-index: 0;
    line-height: 1;
  }

  /* ── SMALL VIEW ── */
  #small-view {
    display: none;
    width: 100%; height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    text-align: center;
  }

  .small-logo {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .small-hint {
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .small-cta {
    font-size: 8.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 3px 8px;
  }
</style>
</head>
<body>

// ── SEED / SYNC ──
function getSeed() {
  // Changes every 30 minutes — both instances stay in sync
  const now = new Date();
  const slot = Math.floor((now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate()) * 48 +
    Math.floor((now.getHours() * 60 + now.getMinutes()) / 30));
  return slot;
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

function getItem() {
  const seed = getSeed();
  const rng = seededRandom(seed);
  const idx = Math.floor(rng() * TRIVIA.length);
  return { item: TRIVIA[idx], seed };
}

// ── INIT ──
function getMode() {
  const params = new URLSearchParams(window.location.search);
  return params.get('mode') || 'question'; // 'question' or 'answer'
}

function getViewSize() {
  // TRMNL passes view param, or we detect from iframe size
  const params = new URLSearchParams(window.location.search);
  const v = params.get('view');
  if (v) return v;
  // fallback: width-based
  const w = window.innerWidth;
  if (w >= 700) return 'full';
  if (w >= 400) return 'half';
  return 'quadrant';
}

function init() {
  const mode = getMode();
  const view = getViewSize();
  const { item, seed } = getItem();

  if (view === 'full') {
    document.getElementById('full-view').style.display = 'flex';

    if (mode === 'question') {
      document.getElementById('mode-badge').textContent = '❓ QUESTION';
      document.getElementById('category-tag').textContent = item.cat.toUpperCase() + ' · ' + item.ep;
      document.getElementById('trivia-text').textContent = item.q;
      document.getElementById('trivia-text').classList.remove('answer-text');
      document.getElementById('deco-q').textContent = '?';
      document.getElementById('deco-q').className = 'q-mark';
    } else {
      document.getElementById('mode-badge').textContent = '✓ ANSWER';
      document.getElementById('category-tag').textContent = item.cat.toUpperCase() + ' · ' + item.ep;
      document.getElementById('trivia-text').textContent = item.a;
      document.getElementById('trivia-text').classList.add('answer-text');
      document.getElementById('deco-q').textContent = '✓';
      document.getElementById('deco-q').className = 'checkmark';
    }

    document.getElementById('ep-ref').textContent = item.ep;
    document.getElementById('seed-disp').textContent = '#' + (seed % 10000);

  } else {
    // Small views
    document.getElementById('small-view').style.display = 'flex';
    if (mode === 'question') {
      document.getElementById('small-hint').textContent = 'Trivia question on full screen 📋';
      document.getElementById('small-cta').textContent = 'SEE QUESTION';
    } else {
      document.getElementById('small-hint').textContent = 'Answer revealed on full screen ✓';
      document.getElementById('small-cta').textContent = 'SEE ANSWER';
    }
  }
}

init();
